name: Update Genshin data

on:
  schedule:
    # Daily, off-the-hour on purpose to avoid piling onto everyone
    # else's :00 cron jobs. Cheap most days: update_data.py checks
    # Ambr's own data version first and skips the whole pipeline
    # (including the per-character detail pull) unless it actually
    # changed since last run.
    - cron: "43 3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Ambr HTTP responses
        uses: actions/cache@v4
        with:
          path: .cache/ambr
          # Primary key is always unique (run_id), so this step always saves
          # a fresh cache at the end of every run. restore-keys then does a
          # prefix match to restore the most recent previous run's cache at
          # the start, so update_data.py mostly hits its own local cache
          # instead of Ambr's API, even though nothing carries over via git.
          key: ambr-cache-${{ github.run_id }}
          restore-keys: |
            ambr-cache-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run data sync
        run: python scripts/update_data.py

      - name: Commit changes if any
        run: |
          git config user.name "genshin-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add assets/data/characters.js assets/data/weapons.js assets/data/character-profiles/ assets/data/weapon-profiles/ assets/data/shared-assets/ scripts/.data-version.json
          if git diff --cached --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: sync characters/weapons/profiles from Project Ambr"
            git push
          fi
